id = "default-observe"
rule_chain = "configs/rules/default.json"

symbol = "DEFAULT"
[risk_management]
# ======================================================================
# A. 基础风险参数（Base Risk）
# ======================================================================

# 单笔风险占比（占账户权益的百分比）
# 例：0.1 = 每笔最多承担 10% 账户权益风险
risk_per_trade_pct = 0.1

# 最大可用资金占比
# 例：1 = 使用全部资金
max_invest_pct = 1

# 最大有效杠杆倍数
max_leverage = 10

# 信号质量与风险系数的映射
# Grade 由 setup_quality 自动评定：
#   Grade 3 = quality >= 0.75 → factor 1.00
#   Grade 2 = quality >= 0.55 → factor 0.70
#   Grade 1 = quality >= 0.35 → factor 0.40
#   Grade 0 = quality < 0.35  → 不开仓
grade_3_factor = 1.0
grade_2_factor = 0.70
grade_1_factor = 0.40

# ======================================================================
# B. 入场模式（Entry Mode）
# ======================================================================

# 入场价格确定方式：orderbook / atr_offset / market
entry_mode = "orderbook"

# orderbook 模式：第几档深度
orderbook_depth = 5

# atr_offset 模式：ATR 偏移倍数
entry_offset_atr = 0.1

# ======================================================================
# C. 出场模式（Exit / TP-SL）
# ======================================================================

# TP1 后保本手续费补偿（0 = 不补偿）
breakeven_fee_pct = 0.0

# 止损滑点缓冲比例
slippage_buffer_pct = 0.0005

# 风险策略模式：llm / native
[risk_management.risk_strategy]
mode = "llm"

# 初始止盈止损
[risk_management.initial_exit]
# atr_structure_v1 / fixed_rr_v1 / structure_tp_v1
policy = "atr_structure_v1"
# 结构位来源周期：auto 或指定周期
structure_interval = "auto"

[risk_management.initial_exit.params]
# ATR 止损倍数
stop_atr_multiplier = 2.0
# 最小止损距离百分比
stop_min_distance_pct = 0.005
# 止盈 R 倍数
take_profit_rr = [1.5, 3.0]
# 分批止盈比例
take_profit_ratios = [0.5, 0.5]

# 持仓收紧
[risk_management.tighten_atr]
structure_threatened = 0.5
tp1_atr = 0.0
tp2_atr = 0.0
min_tp_distance_pct = 0.0
min_tp_gap_pct = 0.0
# 收紧间隔（秒），0 = 不限制
min_update_interval_sec = 300

# ======================================================================
# D. Gate 决策阈值
# ======================================================================
# Gate 决定"做不做"。基础逻辑分 3 层：
# 1. 基础保护：方向不明确 / 数据缺失，始终直接 VETO，不提供配置开关
# 2. 业务型硬停：结构硬失效 / 连锁清算，可通过 hard_stop 开关控制
# 3. 连续评分：其余情况由 setup_quality 和 entry_edge 两个连续分数决定
[risk_management.gate]

# 建仓质量阈值
# setup_quality 公式（范围 [0, 1]）：
#   +0.30 结构清晰 +0.25 结构完整 +0.20 指标对齐
#   +0.15 动能扩张 +0.10×脚本加分 -0.20 噪音 -0.25 tag矛盾
# 调参：0.20 激进 / 0.35 默认 / 0.55 保守 / 0.75 极保守
quality_threshold = 0.35

# 执行价值阈值
# entry_edge = |方向分数| × setup_quality × (1 - risk_penalty)
# 调参：0.05 激进 / 0.10 默认 / 0.20 保守 / 0.30 极保守
edge_threshold = 0.10

# Gate 业务型硬停开关
[risk_management.gate.hard_stop]

# 结构硬失效开关
# true  = Provider 判断结构已破坏时，直接 VETO
# false = 不再直接 VETO，继续进入连续评分
# 注意：关闭后不代表一定放行；structure.integrity=false 仍会显著拉低 quality
structure_invalidation = true

# 连锁清算硬停开关
# true  = mechanics.signal_tag = liquidation_cascade 时直接 VETO
# false = 不再直接 VETO，继续进入连续评分
# 注意：关闭后 risk_penalty 仍然会很高，很多场景仍会因为 entry_edge 不足而 WAIT
liquidation_cascade = true

# ======================================================================
# E. 持仓 Hard Guard
# ======================================================================
# 这组规则只在 IN_POSITION 阶段生效，用于保护已持仓位。
# 与 Gate 不同，这里命中后是直接 EXIT，不是 WAIT。
[risk_management.hard_guard]

# 总开关
# false 时整组 Hard Guard 都失效，下面的单项开关也会被忽略。
# 建议只在强人工接管或特殊实验阶段关闭。
enabled = true

# 止损价硬退出
# true  = 触及/穿越 stop_loss 时直接 EXIT
# false = 不再由 Hard Guard 因 stop_loss 直接退出
# 风险最高，不建议常规关闭。
stop_loss = true

# RSI 极值退出
# true  = 多头 RSI 过高或空头 RSI 过低时直接 EXIT
# false = 关闭这一条极值保护
rsi_extreme = true

# 5 分钟不利方向断路器
# true  = 短时出现异常不利波动时直接 EXIT
# false = 关闭这一条短时波动保护
circuit_breaker = true

# ======================================================================
# F. Sieve 仓位缩放
# ======================================================================
# 默认策略（DEFAULT）为观察模式，所有行 size_factor = 0.0
# 表示不实际开仓。如需启用交易，请参考 ETHUSDT.toml 配置有意义的 size_factor。
[risk_management.sieve]
min_size_factor = 0.0
default_gate_action = "ALLOW"
default_size_factor = 1.0

[[risk_management.sieve.rows]]
mechanics_tag = "fuel_ready"
liq_confidence = "high"
crowding_align = false
gate_action = "ALLOW"
size_factor = 0.0
reason_code = "FUEL_HIGH"

[[risk_management.sieve.rows]]
mechanics_tag = "fuel_ready"
liq_confidence = "low"
crowding_align = false
gate_action = "ALLOW"
size_factor = 0.0
reason_code = "FUEL_LOW"

[[risk_management.sieve.rows]]
mechanics_tag = "neutral"
liq_confidence = "high"
crowding_align = false
gate_action = "ALLOW"
